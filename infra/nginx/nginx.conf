# Reference nginx config for fronting all three services behind one origin
# in production. Not required for local dev (each service runs on its own
# port) — included for when you deploy this behind a single domain.

events {}

http {
  upstream frontend { server frontend:3000; }
  upstream gateway  { server gateway:4000; }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off; # required for SSE streaming
    }

    location /auth/ {
      proxy_pass http://gateway;
    }

    location / {
      proxy_pass http://frontend;
    }
  }
}
